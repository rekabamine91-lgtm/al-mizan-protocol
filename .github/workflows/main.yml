name: Al-Mizan Protocol CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"] # سنركز على نسخة واحدة مستقرة الآن لتقليل نقاط الفشل

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        
    - name: Run Tests
      run: |
        # سنشغل الاختبارات بشكل مبسط للتأكد من نجاحها أولاً
        pytest tests/
        
